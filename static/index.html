<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TraceLens · Trace replay</title>
    <style>
      :root {
        color-scheme: dark;
        --background: #101217;
        --panel: #191d25;
        --panel-raised: #222832;
        --line: #323a48;
        --text: #edf1f7;
        --muted: #9da7b6;
        --accent: #7dd3fc;
        --success: #86efac;
        --warning: #fbbf24;
        --danger: #fb7185;
        --danger-bg: #351a24;
        --code: #cbd5e1;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-width: 320px;
        background: var(--background);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .shell {
        width: min(100% - 32px, 980px);
        margin: 0 auto;
        padding: 48px 0 72px;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--accent);
        font-size: .78rem;
        font-weight: 700;
        letter-spacing: .12em;
        text-transform: uppercase;
      }

      h1 { margin: 0; font-size: clamp(2rem, 5vw, 3.1rem); letter-spacing: -.04em; }
      .subtitle { max-width: 630px; color: var(--muted); margin: 12px 0 28px; line-height: 1.55; }

      .loader {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
      }

      label { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0, 0, 0, 0); }

      input, button { font: inherit; }
      input {
        width: 100%;
        min-width: 0;
        padding: 11px 13px;
        border: 1px solid #495466;
        border-radius: 8px;
        background: #11151c;
        color: var(--text);
      }
      input:focus, button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        cursor: pointer;
        color: #09202d;
        background: var(--accent);
        font-weight: 700;
      }
      button:hover { filter: brightness(1.08); }

      .quick-links { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0 20px; }
      .quick-links button { color: var(--text); background: var(--panel-raised); border: 1px solid var(--line); font-size: .9rem; }

      .notice {
        min-height: 28px;
        margin: 0 0 12px;
        color: var(--muted);
        line-height: 1.5;
      }
      .notice.error { color: #fda4af; }

      .run-heading { margin: 28px 0 12px; font-size: 1.1rem; color: var(--text); }
      .run-heading code { color: var(--accent); }

      .timeline { position: relative; padding-left: 28px; }
      .timeline::before {
        content: "";
        position: absolute;
        left: 8px;
        top: 8px;
        bottom: 8px;
        width: 2px;
        background: var(--line);
      }

      .step {
        position: relative;
        margin-bottom: 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
        overflow: hidden;
      }
      .step::before {
        content: "";
        position: absolute;
        left: -25px;
        top: 23px;
        width: 11px;
        height: 11px;
        border: 3px solid var(--background);
        border-radius: 50%;
        background: #718096;
      }
      .step.flagged { border-color: #a93550; background: var(--danger-bg); }
      .step.flagged::before { background: var(--danger); }

      .step-summary {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        width: 100%;
        padding: 16px;
        border: 0;
        border-radius: 0;
        color: inherit;
        background: transparent;
        text-align: left;
        cursor: default;
      }
      .flagged .step-summary { cursor: pointer; }
      .flagged .step-summary:hover { background: rgba(251, 113, 133, .06); }

      .step-id { display: block; overflow-wrap: anywhere; font-size: 1rem; font-weight: 750; }
      .step-type { display: block; margin-top: 4px; color: var(--muted); font-size: .86rem; }
      .badges { display: flex; align-items: start; justify-content: end; gap: 7px; flex-wrap: wrap; }
      .badge { padding: 3px 7px; border-radius: 999px; background: #2c3542; color: var(--code); font-size: .75rem; font-weight: 700; white-space: nowrap; }
      .badge.success { color: #bbf7d0; background: #183526; }
      .badge.error, .badge.timeout, .badge.issue { color: #fecdd3; background: #5b202f; }
      .badge.issue::before { content: "⚠ "; }

      .previews { display: grid; gap: 8px; padding: 0 16px 16px; }
      .preview-label { display: block; margin-bottom: 3px; color: var(--muted); font-size: .72rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
      pre {
        margin: 0;
        overflow-x: auto;
        padding: 8px 10px;
        border-radius: 7px;
        background: #11151c;
        color: var(--code);
        font: .78rem/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .issue-details { display: none; border-top: 1px solid #7f2a40; padding: 14px 16px 16px; background: rgba(64, 16, 29, .32); }
      .step.expanded .issue-details { display: grid; gap: 11px; }
      .issue-detail { border-left: 3px solid var(--danger); padding-left: 10px; }
      .issue-detail h3 { margin: 0 0 5px; color: #fecdd3; font-size: .87rem; }
      .issue-detail p { margin: 0; color: #f4d9de; line-height: 1.5; }

      .empty {
        padding: 28px;
        border: 1px dashed var(--line);
        border-radius: 12px;
        color: var(--muted);
        text-align: center;
      }

      @media (max-width: 560px) {
        .shell { width: min(100% - 22px, 980px); padding-top: 28px; }
        .loader { grid-template-columns: 1fr; }
        .loader button { width: 100%; }
        .step-summary { grid-template-columns: 1fr; }
        .badges { justify-content: start; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <p class="eyebrow">Trace replay</p>
      <h1>Follow an agent run.</h1>
      <p class="subtitle">Load a run to inspect every recorded step. Warnings are enriched with the current explainer so you can see what failed and the next action to investigate.</p>

      <form class="loader" id="run-form">
        <label for="run-id">Run ID</label>
        <input id="run-id" name="run-id" autocomplete="off" placeholder="Enter a run_id, e.g. demo-retry-loop" required>
        <button type="submit">Load trace</button>
      </form>
      <div class="quick-links" aria-label="Demo runs">
        <button type="button" class="quick-run" data-run-id="demo-retry-loop">Load demo-retry-loop</button>
        <button type="button" class="quick-run" data-run-id="demo-tool-error">Load demo-tool-error</button>
        <button type="button" class="quick-run" data-run-id="demo-mixed-failures">Load demo-mixed-failures</button>
      </div>

      <p class="notice" id="notice" role="status">Choose a demo run or enter a run ID.</p>
      <section id="trace-view" aria-live="polite"></section>
    </main>

    <script>
      const form = document.querySelector("#run-form");
      const runIdInput = document.querySelector("#run-id");
      const notice = document.querySelector("#notice");
      const traceView = document.querySelector("#trace-view");

      function setNotice(message, isError = false) {
        notice.textContent = message;
        notice.classList.toggle("error", isError);
      }

      function jsonPreview(value) {
        const serialized = JSON.stringify(value);
        return serialized.length > 220 ? `${serialized.slice(0, 217)}...` : serialized;
      }

      function makeElement(tag, className, text) {
        const element = document.createElement(tag);
        if (className) element.className = className;
        if (text !== undefined) element.textContent = text;
        return element;
      }

      function createPreview(label, value) {
        const wrapper = makeElement("div");
        wrapper.append(makeElement("span", "preview-label", label));
        wrapper.append(makeElement("pre", "", jsonPreview(value)));
        return wrapper;
      }

      function createIssueDetails(issues) {
        const details = makeElement("div", "issue-details");
        for (const issue of issues) {
          const issueDetail = makeElement("section", "issue-detail");
          issueDetail.append(makeElement("h3", "", `⚠ ${issue.issue_type}`));
          issueDetail.append(makeElement("p", "", issue.ai_explanation || issue.explanation));
          details.append(issueDetail);
        }
        return details;
      }

      function createStep(event, issues) {
        const step = makeElement("article", `step${issues.length ? " flagged" : ""}`);
        const summary = makeElement("button", "step-summary");
        summary.type = "button";

        const title = makeElement("div");
        title.append(makeElement("span", "step-id", event.step_id));
        title.append(makeElement("span", "step-type", event.step_type));
        summary.append(title);

        const badges = makeElement("div", "badges");
        badges.append(makeElement("span", `badge ${event.status}`, event.status));
        badges.append(makeElement("span", "badge", `${event.latency_ms} ms`));
        if (issues.length) badges.append(makeElement("span", "badge issue", `${issues.length} issue${issues.length === 1 ? "" : "s"}`));
        summary.append(badges);
        step.append(summary);

        const previews = makeElement("div", "previews");
        previews.append(createPreview("Input", event.input));
        previews.append(createPreview("Output", event.output));
        step.append(previews);

        if (issues.length) {
          const details = createIssueDetails(issues);
          step.append(details);
          summary.setAttribute("aria-expanded", "false");
          summary.addEventListener("click", () => {
            const expanded = step.classList.toggle("expanded");
            summary.setAttribute("aria-expanded", String(expanded));
          });
        } else {
          summary.tabIndex = -1;
        }
        return step;
      }

      function renderTrace(runId, events, issueMap) {
        traceView.replaceChildren();
        traceView.append(makeElement("h2", "run-heading", `Timeline · ${runId}`));
        if (!events.length) {
          traceView.append(makeElement("p", "empty", "No trace events were found for this run."));
          return;
        }
        const timeline = makeElement("div", "timeline");
        for (const event of events) {
          timeline.append(createStep(event, issueMap.get(event.step_id) || []));
        }
        traceView.append(timeline);
      }

      async function readJson(response, endpoint) {
        if (!response.ok) {
          const message = await response.text();
          throw new Error(`${endpoint} returned ${response.status}${message ? `: ${message}` : ""}`);
        }
        return response.json();
      }

      async function loadRun(runId) {
        const cleanRunId = runId.trim();
        if (!cleanRunId) return;
        runIdInput.value = cleanRunId;
        setNotice(`Loading ${cleanRunId}…`);
        traceView.replaceChildren();
        const encodedRunId = encodeURIComponent(cleanRunId);
        try {
          const [trace, issues] = await Promise.all([
            fetch(`/traces/${encodedRunId}`).then(response => readJson(response, "Trace endpoint")),
            fetch(`/traces/${encodedRunId}/issues/explained`).then(response => readJson(response, "Issues endpoint")),
          ]);
          const issueMap = new Map();
          for (const issue of issues) {
            const stepIssues = issueMap.get(issue.step_id) || [];
            stepIssues.push(issue);
            issueMap.set(issue.step_id, stepIssues);
          }
          renderTrace(cleanRunId, trace.events, issueMap);
          setNotice(`${trace.events.length} step${trace.events.length === 1 ? "" : "s"} loaded · ${issues.length} issue${issues.length === 1 ? "" : "s"} detected.`);
        } catch (error) {
          setNotice(`Could not load '${cleanRunId}'. ${error.message}`, true);
        }
      }

      form.addEventListener("submit", event => {
        event.preventDefault();
        loadRun(runIdInput.value);
      });
      document.querySelectorAll(".quick-run").forEach(button => {
        button.addEventListener("click", () => loadRun(button.dataset.runId));
      });
    </script>
  </body>
</html>
